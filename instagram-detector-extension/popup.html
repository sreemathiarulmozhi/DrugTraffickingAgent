<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>InstaDetector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 200px;
            height: 80px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .status {
            text-align: center;
            padding: 20px;
        }
        
        .status h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .status p {
            color: #666;
            font-size: 12px;
        }
        
        .backend-status {
            position: absolute;
            bottom: 5px;
            font-size: 10px;
            text-align: center;
            width: 100%;
            color: #666;
        }
        
        .connected {
            color: #00C851;
        }
        
        .disconnected {
            color: #ff4444;
        }
    </style>
</head>
<body>
    <div class="status">
        <h3>🔍 InstaDetector</h3>
        <p id="statusText">Triggering analysis...</p>
    </div>
    
    <div class="backend-status">
        Backend: <span id="backendStatus">Checking...</span>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
